# config.yaml — 12D ATTENTION + COUNTERFACTUAL REWARD

data:
  seq_path: data/MOT17/train/MOT17-04-FRCNN

  train_sequences:
    - data/MOT17/train/MOT17-04-FRCNN
    - data/MOT17/train/MOT17-02-FRCNN
    - data/MOT17/train/MOT17-04-FRCNN-Whitebox
    - data/MOT17/train/MOT17-02-FRCNN-Whitebox
    - data/MOT17/train/MOT17-04-FRCNN-Blackbox
    - data/MOT17/train/MOT17-02-FRCNN-Blackbox

  extra_sequences:
    - data/MOT17/train/MOT17-09-FRCNN
    - data/MOT17/train/MOT17-09-FRCNN-Whitebox
    - data/MOT17/train/MOT17-09-FRCNN-Blackbox

reward:
  w_rec:  5.0       
  w_fp:   2.0       
  w_lost: 0.5       
  w_cost: 1.0       

ppo:
  total_timesteps: 150000 
  n_steps: 1024
  batch_size: 128
  n_epochs: 10
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  net_arch: [128, 128] # Expanded for 12D state

paths:
  model_save: outputs/mtd_ppo_agent
  tb_logs: outputs/tb_logs

device:
  use_gpu: true
  gpu_id: 0
  n_envs: 1