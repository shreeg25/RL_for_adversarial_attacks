# config.yaml
data:
  seq_path: data/MOT17/train/MOT17-04-FRCNN     
  extra_sequences:                               
    - data/MOT17/train/MOT17-02-FRCNN
    - data/MOT17/train/MOT17-09-FRCNN

reward:
  w1: 1.0      
  w2: 5.0      
  w3: 0.5      

ppo:
  total_timesteps: 500000
  n_steps: 4096           # Increased to accumulate bigger data rolls per cycle
  batch_size: 512         # Scaled up from 64 to fill GPU thread capacities
  n_epochs: 10
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01          
  net_arch: [64, 64]

paths:
  model_save: outputs/mtd_ppo_agent
  tb_logs: outputs/tb_logs
  debug_csv: outputs/state_debug.csv

device:
  use_gpu: true
  gpu_id: 0                
  mixed_precision: true    
  num_workers: 4           
  pin_memory: true  
  n_envs: 3               # Sets 1 dedicated worker process per active tracking track